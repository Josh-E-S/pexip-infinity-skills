name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  hygiene:
    name: Pre-commit hygiene (hooks + gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  validate-skills:
    name: Validate Agent Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run skill validator
        run: |
          if [[ -x scripts/validate-skills.py ]]; then
            python3 scripts/validate-skills.py
          else
            echo "scripts/validate-skills.py not present yet (pre-import); skipping"
          fi
