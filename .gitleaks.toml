# gitleaks configuration for pexip-infinity-skills (public repo)
#
# Extends the default ruleset; adds an allowlist for documentation examples
# that look secret-shaped but aren't.

[extend]
useDefault = true

[allowlist]
description = "Documented example values that look secret-like but are placeholders"

# Public/test-only domains and example fixtures are fine in documentation.
regexes = [
  # Anthropic-style placeholder API keys used in docs
  '''sk-ant-(api|admin)0?[0-9]*-(EXAMPLE|PLACEHOLDER|YOUR_KEY)''',
  # Generic placeholder tokens
  '''<[A-Z_]+>''',
  '''YOUR_[A-Z_]+''',
  '''xxxx+''',
  '''\bexample\.(com|org|net)\b''',
  # TEST-NET-1/2/3 documentation IP ranges (RFC 5737)
  '''\b(192\.0\.2|198\.51\.100|203\.0\.113)\.\d{1,3}\b''',
  # RFC 1918 private ranges — fine to appear in docs
  '''\b10\.\d{1,3}\.\d{1,3}\.\d{1,3}\b''',
  '''\b192\.168\.\d{1,3}\.\d{1,3}\b''',
  '''\b172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}\b''',
]

paths = [
  '''(?i)^(\.gitleaks\.toml|\.pre-commit-config\.yaml)$''',
  '''(?i)^(CHANGELOG\.md|README\.md)$''',
  '''^spec/.*\.md$''',
]
